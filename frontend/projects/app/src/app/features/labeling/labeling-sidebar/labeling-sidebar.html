<div class="rounded-xl border bg-card p-4">
  <div class="mb-3 text-sm font-semibold">Clause types</div>
  <div class="space-y-1.5">
    @for (t of clauseTypes(); track t.id) {
      <div class="flex items-center gap-2 text-sm">
        <span class="h-3 w-3 rounded-[3px]" [style.background-color]="t.color"></span>
        <span class="text-muted-foreground">{{ t.name }}</span>
      </div>
    }
  </div>
</div>

<div class="rounded-xl border bg-card p-4">
  <div class="mb-3 flex items-center justify-between">
    <div class="text-sm font-semibold">Clauses in this document</div>
    <span class="rounded-full bg-muted px-2 py-0.5 text-xs text-muted-foreground">{{ totalLabeled() }}</span>
  </div>
  @if (summary().length) {
    <div class="space-y-1">
      @for (row of summary(); track row.type.id) {
        <button
          type="button"
          (click)="scrollTo.emit(row.type)"
          class="flex w-full items-center gap-2 rounded-md px-2 py-1.5 text-left transition hover:bg-muted"
        >
          <span class="h-2.5 w-2.5 rounded-[3px]" [style.background-color]="row.type.color"></span>
          <span class="flex-1 text-sm">{{ row.type.name }}</span>
          <span class="text-xs font-semibold text-muted-foreground">{{ row.count }}</span>
        </button>
      }
    </div>
  } @else {
    <div class="text-sm text-muted-foreground">No clauses marked yet. Click a sentence to label it.</div>
  }
</div>
