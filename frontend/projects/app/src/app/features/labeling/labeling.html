@if (loading()) {
  <div class="flex items-center justify-center py-32"><hlm-spinner /></div>
} @else if (error() || !doc()) {
  <div class="mx-auto max-w-md px-6 py-24 text-center">
    <h2 class="text-base font-medium">Document not found</h2>
    <p class="mt-1 text-sm text-muted-foreground">It may have been deleted, or the backend isn't running.</p>
    <button hlmBtn variant="outline" class="mt-5" (click)="back()">Back to overview</button>
  </div>
} @else {
  <div class="flex items-start gap-6">
    <!-- CENTER: the document reading pane -->
    <div class="min-w-0 flex-1">
      <app-document-view
        [doc]="doc()!"
        [sentences]="viewSentences()"
        [totalLabeled]="totalLabeled()"
        [selectedId]="selectedSentenceId()"
        [flashId]="flashId()"
        (sentenceClick)="onSentenceClick($event)"
      />
    </div>

    <!-- RIGHT: clause palette + per-document summary -->
    <aside class="hidden w-80 shrink-0 xl:block">
      <div class="sticky top-20 space-y-4">
        <app-labeling-sidebar
          [clauseTypes]="clauseTypes()"
          [summary]="summary()"
          [totalLabeled]="totalLabeled()"
          (scrollTo)="scrollToType($event)"
        />
      </div>
    </aside>
  </div>
}

<!-- In-place labeling popover -->
@if (selectedSentenceId() !== null) {
  <app-clause-popover
    [top]="popoverTop()"
    [left]="popoverLeft()"
    [clauseTypes]="clauseTypes()"
    [annotation]="selectedAnn()"
    (typeSelect)="applyType($event)"
    (acceptSuggestion)="accept()"
    (rejectSuggestion)="reject()"
    (removeLabel)="removeLabel()"
    (dismiss)="closePopover()"
  />
}
