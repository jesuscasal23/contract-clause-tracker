<div class="fixed inset-0 z-40" (click)="dismiss.emit()"></div>
<div
  class="fixed z-50 w-72 rounded-xl border bg-popover p-1.5 text-popover-foreground shadow-xl"
  [style.top.px]="top()"
  [style.left.px]="left()"
>
  <div class="px-2 py-1.5 text-[11px] font-medium uppercase tracking-wide text-muted-foreground">
    {{ annotation() ? 'Change clause type' : 'Label this sentence as…' }}
  </div>

  @if (annotation()?.status === 'suggested') {
    <div class="mb-1 flex gap-1 px-1">
      <button hlmBtn size="sm" class="flex-1" (click)="acceptSuggestion.emit()">Accept</button>
      <button hlmBtn size="sm" variant="outline" class="flex-1" (click)="rejectSuggestion.emit()">Reject</button>
    </div>
  }

  @for (t of clauseTypes(); track t.id) {
    <button
      type="button"
      (click)="typeSelect.emit(t.id)"
      class="flex w-full items-center gap-2 rounded-md px-2 py-1.5 text-sm transition hover:bg-muted"
    >
      <span class="h-3 w-3 rounded-[3px]" [style.background-color]="t.color"></span>
      <span class="flex-1 text-left">{{ t.name }}</span>
      @if (annotation()?.clause_type_id === t.id) {
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-primary"><path d="M20 6 9 17l-5-5"/></svg>
      }
    </button>
  }

  @if (annotation()) {
    <button
      type="button"
      (click)="removeLabel.emit()"
      class="mt-1 flex w-full items-center gap-2 rounded-md border-t px-2 py-2 text-sm text-destructive transition hover:bg-muted"
    >
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      Remove label
    </button>
  }
</div>
