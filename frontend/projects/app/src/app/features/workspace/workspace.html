<!-- No bg-background here: the Legartis hero gradient painted on <body> (styles.css) shows through. -->
<div class="min-h-screen text-foreground">
  <!-- Top bar -->
  <header class="sticky top-0 z-30 border-b bg-background/60 backdrop-blur">
    <div class="flex items-center gap-3 px-4 py-3 sm:px-6">
      <button hlmBtn variant="ghost" size="sm" class="lg:hidden" (click)="drawerOpen.set(true)" title="Show documents">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18"/></svg>
        Documents
      </button>
      <div class="text-lg font-semibold tracking-tight">Clause<span class="text-primary">Tracker</span></div>
      <span class="hidden rounded-full bg-muted px-2 py-0.5 text-xs text-muted-foreground sm:inline">Contract clause labeling</span>
    </div>
  </header>

  <!-- Three-column workspace -->
  <div class="mx-auto flex max-w-[1600px] items-start gap-6 px-4 py-6 sm:px-6">
    <!-- LEFT: document list (desktop) -->
    <aside class="hidden w-80 shrink-0 lg:block">
      <div class="sticky top-20 flex h-[calc(100vh-6.5rem)] flex-col">
        <ng-container *ngTemplateOutlet="leftPanel"></ng-container>
      </div>
    </aside>

    <!-- CENTER: labeling view or empty state (+ its right sidebar) -->
    <main class="min-w-0 flex-1">
      <router-outlet />
    </main>
  </div>
</div>

<!-- LEFT drawer (mobile) -->
@if (drawerOpen()) {
  <div class="fixed inset-0 z-40 bg-black/40 lg:hidden" (click)="drawerOpen.set(false)"></div>
  <div class="fixed inset-y-0 left-0 z-50 w-80 max-w-[85vw] p-3 lg:hidden">
    <ng-container *ngTemplateOutlet="leftPanel"></ng-container>
  </div>
}

<!-- One set of panel bindings, rendered in both the desktop aside and the mobile drawer -->
<ng-template #leftPanel>
  <app-doc-list-panel
    [docs]="liveDocs()"
    [visibleDocs]="filteredDocs()"
    [clauseTypes]="clauseTypes()"
    [loading]="loading()"
    [search]="search()"
    [activeFilterId]="activeClauseFilter()"
    [grouped]="groupBy()"
    (searchChange)="onSearchInput($event)"
    (filterChange)="activeClauseFilter.set($event)"
    (groupedToggle)="toggleGroupBy()"
    (openDoc)="open($event)"
    (deleteDoc)="pendingDelete.set($event)"
    (uploadClick)="uploadOpen.set(true)"
  />
</ng-template>

<app-upload-modal [(open)]="uploadOpen" (uploaded)="onUploaded($event)" />

@if (pendingDelete(); as doc) {
  <app-delete-document-dialog [doc]="doc" (cancel)="pendingDelete.set(null)" (confirm)="confirmDelete()" />
}
