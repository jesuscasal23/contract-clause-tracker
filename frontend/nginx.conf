server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Angular is a client-side-routed SPA: fall back to index.html so deep links
    # like /documents/5 resolve on refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed build assets.
    location ~* \.(?:js|css|woff2?|ttf|png|svg|jpe?g|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
