services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clause_tracker
    ports:
      - "5433:5432"  # host 5433 (5432 is often taken); local (non-Docker) backend dev reuses this db
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clause_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/clause_tracker
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    # The browser (on the host) loads the app from http://localhost:4200 and calls the
    # backend directly at http://localhost:8000 (the app's default API base). The backend
    # CORS allow-list already includes http://localhost:4200.

volumes:
  db-data:
