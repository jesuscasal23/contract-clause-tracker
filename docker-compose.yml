services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data

  frontend:
    build: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    # The browser (on the host) loads the app from http://localhost:4200 and calls the
    # backend directly at http://localhost:8000 (the app's default API base). The backend
    # CORS allow-list already includes http://localhost:4200.

volumes:
  backend-data:
